# versions = ["3.13.8", "3.14.3"]
# slugs = ["py3138", "py3143"]
# source_url_template = "https://www.python.org/ftp/python/{version}/Python-{version}.tgz"
# configure_args = ["--enable-optimizations", "--with-lto", "--enable-shared"]
#
# [gcc]
# version = "14.2.0"
# slug = "gcc14"
# source_url = "https://ftp.gnu.org/gnu/gcc/gcc-14.2.0/gcc-14.2.0.tar.xz"
# configure_args = [
#     "--enable-languages=c,c++",
#     "--disable-multilib",
#     "--disable-bootstrap",
#     "--prefix=/usr/local",
# ]
#
# [build]
# renderer = "multi"
# jobs = 0
#
# # Output: oe2403sp1-py3138_py3143-gcc14-<arch>.tar.gz
# # CPython 3.13.8 → /usr/local/cpython-3.13  (default: python3/python/pip3/pip)
# # CPython 3.14.3 → /usr/local/cpython-3.14
# # GCC 14.2.0  → /usr/local/bin/gcc  (default, priority 20)
# # GCC 12      → /usr/bin/gcc-12    (yum, priority 10)
# # Switch: update-alternatives --config gcc
