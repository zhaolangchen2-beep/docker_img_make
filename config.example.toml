# Example: openEuler 24.03 SP1 + CPython 3.14.3 + GCC 14.2.0
# Output filename: oe2403sp1-py3143-gcc14-<arch>.tar.gz

[base]
# Image source. One of:
#   "registry" — pull `image` via `docker pull` (default)
#   "tarball"  — download `image_url` (tar / tar.gz / tar.xz / tar.bz2)
#                and load via `docker import`
source = "registry"
# Used when source = "registry"
image = "openeuler/openeuler:24.03-lts-sp1"
# Used when source = "tarball". Auto-detected as either:
#   * a `docker save` archive (has manifest.json at top level) → docker load
#   * a flat rootfs tarball                                    → docker import
# Example (openEuler official is a save archive, NOT a rootfs):
# image_url = "https://repo.openeuler.org/openEuler-24.03-LTS-SP1/docker_img/aarch64/openEuler-docker.aarch64.tar.xz"
# Short slug used in the output filename.
os_slug = "oe2403sp1"
# Package manager family: "dnf", "yum", or "apt".
pkg_mgr = "dnf"

[cpython]
version = "3.14.3"
# Short slug used in the output filename (no dots).
slug = "py3143"
# Source tarball URL. Must be a .tgz / .tar.gz / .tar.xz.
source_url = "https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz"
# JIT (PEP 744).
#   false (default) — no JIT at all; --enable-experimental-jit is NOT passed
#                     to configure, no LLVM is downloaded.
#   true            — installs a matching LLVM prebuilt from the official
#                     llvm-project GitHub releases (CPython 3.13.* → LLVM
#                     18.1.8, 3.14.* → 19.1.7; override with `llvm_version`),
#                     auto-injects --enable-experimental-jit=yes-off so the
#                     JIT is compiled in but disabled at runtime, and removes
#                     LLVM/clang during slimming.
jit = false
# llvm_version = "19.1.7"   # optional override, must match the CPython minor
# Optional: full URL to the LLVM tarball. Use this when the default
# LLVM-{ver}-Linux-{X64,ARM64}.tar.xz asset is missing for your version+arch
# (e.g. LLVM 19.1.7 on aarch64 only ships as clang+llvm-...-aarch64-linux-gnu.tar.xz).
# The tarball must have a single top-level directory containing bin/, lib/, etc.;
# we extract with --strip-components=1.
# llvm_url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.7/clang+llvm-19.1.7-aarch64-linux-gnu.tar.xz"
# Passed verbatim to `./configure`. Do NOT add --enable-experimental-jit here;
# it is managed by the `jit` flag above.
configure_args = [
    "--enable-optimizations",
    "--with-lto",
    "--enable-shared",
    "--prefix=/usr/local",
]

[gcc]
version = "14.2.0"
slug = "gcc14"
source_url = "https://ftp.gnu.org/gnu/gcc/gcc-14.2.0/gcc-14.2.0.tar.xz"
configure_args = [
    "--enable-languages=c,c++",
    "--disable-multilib",
    "--disable-bootstrap",
    "--prefix=/usr/local",
]

[build]
# Renderer profile:
#   "single" (default) — one CPython + one source GCC (original flow)
#   "multi"           — multiple CPythons side-by-side + dual GCC (yum + source,
#                        switchable via update-alternatives)
renderer = "single"
# 0 = use nproc inside the container.
jobs = 0
# Extra build dependencies to install on top of a sane default for pkg_mgr.
extra_packages = []
# When true, disable TLS certificate verification for ALL downloads done
# during build:
#   - host-side wget (base tarball)
#   - in-container wget (CPython/GCC/LLVM source tarballs)
#   - dnf/yum (sslverify=False) and apt (Acquire::https::Verify-Peer=false)
# Use only on trusted networks where the proxy/MITM intercepts TLS.
insecure_ssl = false
# When true, install Perl dependencies and build lcov 2.1 from source into
# /usr/local/bin (provides lcov + genhtml for code coverage reporting).
coverage = false

# Optional. Proxy used ONLY during the build (passed via Docker's predefined
# proxy build-args, never written into the image config or the export).
# Leave empty / omit the whole section to build without a proxy.
[proxy]
http  = ""   # e.g. "http://10.0.0.1:8080"
https = ""   # e.g. "http://10.0.0.1:8080"
no    = ""   # e.g. "localhost,127.0.0.1,::1,.internal"

